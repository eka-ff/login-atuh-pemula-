<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link href="https://fonts.googleapis.com/css2?
    family=poppins:wght@300;400;500;600%display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax
    /libs/font-awesome/6.0.0/all.min.css">

    <link rel="stylesheet" href="newlogin">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'poppins',sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('gunung\ 2.jpg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
        }

        body::before{
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba( 15, 23, 42, 0.25);
            z-index: 1;
        }

        .login-box {
            position: relative;
            width: 380px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 10px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0px 10px rgba(0, 0, 0, 0.3);
        }

        .input-grup {
            position: relative;
            margin-bottom: 35px;
        }

        .input-grup i{
            position: absolute;
            left: 0;
            top: 17px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            transition: 0.3s;
        }

        .input-grup input {
            width: 100%;
            padding: 12px 5px 12px 30px;
            font-size: 15px;
            color: #ffffff;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
            outline: none;
            transition: 0.3s;
        }

        .input-grup label {
            position: absolute;
            top: 12px;
            left: 17px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transition: 0.3s ease;
        }

        .input-grup input:focus~label
        .input-grup input:valid~label {
            top: -18px;
            left: 0;
            font-size: 12px;
            color: #39bdf8;
            font-weight: 500;
        } 

        .input-grup input:focus~i
        .input-grup input:valid~i {
            color: #39bdf8;
        }

        .input-grup input:focus {
            border-bottom: 1.5px solid #39bdf8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #39bdf8;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #39bdf8;
            box-shadow: 0px 10px 20px rgba( 14, 165, 233, 0.3);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: #ffffff;
            font-size: 13px;
        }

        .signup-link a {
            color: #39bdf8;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .signup-link a:hover{
            color: #7dd3fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <form id="loginform">
            <h2>login</h2>

            <div class="input-grup">
                <i class="fas fa-user"></i>
                <input type="text" id="username" required>
                <label ></label>
            </div>

            <div class="input-grup">
                <i class="fasfa-lock"></i>
                <input type="password" id="password" required>
                <label ></label>
            </div>

            <button type="submit" class="login-btn" id="submitbtn">login</button>

            <p class="signup-link">
                new here? <a href="sign-up.html">create account</a>
            </p>
        </form>
    </div>

    <script src="newlogin. js">
        document.addEventListener('DOMContentLoaded', () => {
            const loginform = document.getElementById('loginform')
            const submitbtn = document.getElementById('submitbtn')
            
            loginform.addEventListener('submit', function (e) {
                e.preventDefault();

                //visual feed back for user
                submitbtn.innertext = 'verifikasi.......';
                submitbtn.disabel = true

                const username = document.getElementById('username').value;

                //reset button state
                submitbtn.innertext= 'sign in';
                submitbtn.disabel = false;

                //reset form
                loginform.reset();
            }, 1200);
        });

    </script>
</body>
</html>
